set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -g history-limit 100000
set -g mouse on
set -s escape-time 10
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on
set -g detach-on-destroy off
set -g allow-rename off
set -g set-titles on
set -g set-titles-string "#S:#W"

unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux reloaded"
bind / display-popup -E -w 56 -h 32 "cat ~/.config/tmux/cheatsheet; read -r"
bind c new-window -c "#{pane_current_path}"
bind-key -n M-C-h previous-window
bind-key -n M-C-l next-window
bind-key -n M-C-j swap-window -t -1
bind-key -n M-C-k swap-window -t +1
bind Enter copy-mode

unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel
# Load Solarized theme based on system preference
if-shell '~/.local/bin/theme-current | grep -q dark' \
  'source-file ~/.config/tmux/themes/solarized-dark.conf' \
  'source-file ~/.config/tmux/themes/solarized-light.conf'
